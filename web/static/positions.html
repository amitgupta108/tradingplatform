<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" name="viewport" content="width=device-width,initial-scale=1.0"/>
    <meta http-equiv="Cache-Control" content="no-cache"/>
    <title>Trade Positions</title>
        <link rel="stylesheet" href="./styles.css">        
        <script type="text/javascript" src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
        <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
        <script type="text/javascript" src="../js_vollib/lib/rootFinder/rootFinder.js"></script>
        <script type="text/javascript" src="../js_vollib/lib/jmat/jmat.min.js"></script>
        <script type="text/javascript" src="../js_vollib/lib/js_lets_be_rational/build/js_lets_be_rational.js"></script>
        <script type="text/javascript" src="../js_vollib/build/js_vollib.js"></script>
    </head>
    <body>
    <div class="top">
        <!------------------------------------------------------------------------------------------------------------------------------>    
        <div id="leftContainer" class="leftcontainer">
            <div class="tabs">   
                <div id="chart_tab_1" class="tab active-tab">
                    <label>Chart 1</label>
                </div>
                <div id="chart_tab_2" class="tab">
                    <label>Chart 2</label>
                </div>
                <div id="chart_tab_3" class="tab">
                    <label>Chart 3</label>
                </div>
            </div>
            <div id="futures_chart" style="width: 100%; height: 465px; position: relative;"></div>
            <div id="index_chart" style="width: 100%; height: 315px; position: relative;"></div>
        </div>
        <!------------------------------------------------------------------------------------------------------------------------------>    
        <div id="rightContainer" class="rightcontainer">
            <div id="timer">
                <label id="timer_date_lb"></label>
                <label id="timer_time_lb"></label>
                <label> |   Spot:  </label>
                <label id="timer_spot_lb"></label>
                <label> |   Latency:  </label>
                <label id="timer_latency_lb"></label>
            </div>
            <!------------------------------------------------------------------------------------------------------------------------------>    
            <div style="overflow: hidden;">
                <table>
                    <tr style="border-radius: 5px;">
                        <th width="15%">Delta</th>
                        <th width="15%">LTP</th>
                        <th width="20%">CE</th>
                        <th width="20%">PE</th>
                        <th width="15%">LTP</th>
                        <th width="15%">Delta</th>
                    </tr>
                </table>
            </div>
            <!------------------------------------------------------------------------------------------------------------------------------>    
            <div style="height: 34%;">
                <div id="c_oc_div" class="tab-content active">
                    <table id="oc_call_table">
                    </table>
                    <table id="oc_put_table">
                    </table>
                </div>
            <!------------------------------------------------------------------------------------------------------------------------------>    
                <div id="n_oc_div" class="tab-content">
                    <table id="oc_call_table">
                    </table>
                    <table id="oc_put_table">
                    </table>
                </div>
            </div>
            <!------------------------------------------------------------------------------------------------------------------------------>    
            <div class="tabs">
               
                <div id="tabButton1" class="tab" onclick="switchTabs(event)">
                    <label id="oc_expiry_lb"></label>
                    <button id="oc_action_btn" class="smallbutton order" onclick="streamOptionChain(event)">^</button>
                </div>
                <div id="tabButton2" class="tab inert-tab">
                    <input type="text" inputmode="numeric" id="tpt" name="tpt" style="width: 60px;height:18px;">
                    <button id="wsc" class="smallbutton order" onclick="wsconnect('connect')">></button>
                    <button id="wsd" class="smallbutton order" onclick="wsconnect('disconnect')">||</button>
                    <button id="socn" class="smallbutton order">@</button>
                    <label class="switch">
                        <input type="checkbox" id="toggleBasket">
                        <span class="slider round"></span>
                    </label>
                </div>
            </div>
            <!------------------------------------------------------------------------------------------------------------------------------>                
            <div id="positions_div">    
                <div style="width: 100%;height:min-content;">
                <div id="order-list" class="orderlist" style="display: none;">
                    <table>
                        <tbody id="order-list-thead">
                            <tr>
                                <td colspan="8" class="orderlist-td"></td>
                            </tr>
                        </tbody>
                        <tbody id="order-list-tbody">

                        </tbody>
                    </table>
                </div>
                <table id="positions_table">
                    <thead style="overflow: hidden;border-radius: 5px;">
                        <tr style="overflow: hidden;border-radius: 5px;">
                            <th width="4%">
                                <input type='checkbox' id="exit_all_cb"></input>
                            </th>
                            <th width="20%">Instrument</th>
                            <th colspan="3" width="20%">Booked</th>                        
                            <th width="10%">Avg Price</th>
                            <th width="10%">LTP</th>
                            <th colspan="2" width="20%">Unbooked</th>
                            <th width="16%">Total</th>
                        </tr>
                    </thead>    
                    <tbody id="positions_tbody">
                        
                    </tbody>
                </table>
                <button id="exitPositionBtn" style="display: none;padding: 3px;width: 60px;">
                    Exit
                </button>
                </div>   
            </div>
            <!------------------------------------------------------------------------------------------------------------------------------>    
            
            <div id="bottomPanel">    
                <div>
                    <button id="btnStartSim" onclick="connect()">Connect</button>
                    <button id="btnStartSim" onclick="start()">Start</button>
                    <button id="btnStopSim" onclick="stop()">Stop</button>
                    <button id="btnExit" onclick="exit()">Exit</button>
                    <button id="btnListOrders" onclick="listOrders()">Orders</button>
                    <button id="btnVixSubs" onclick="subs_vix()">Vix</button>
                    <select id="optionSpeed" onchange="changeSpeed()">
                        <option value="1x">1x</option>
                        <option value="2x">2x</option>
                        <option value="3x">3x</option>
                        <option value="5x">5x</option>
                        <option value="10x">10x</option>
                    </select>
                </div>

                <div id="bottomPLPanel">
                    <label id="bookedPL">Booked: </label>
                    <label id="vBookedPL">0.00</label>
                    <label id="unbookedPL">Unbooked: </label>
                    <label id="vUnbookedPL">0.00</label>
                    <label id="totalPL">Total: </label>
                    <label id="vTotalPL">0.00</label>
                </div>
            </div>
        </div>
    <!--floating items---------------------------------------------------------------------------------------------------------------------------->    

        <div id="orderwindow" class="orderwindow">
            <label id="ow_close_btn" class="close-btn">X</label>
            <table style="border-radius: 4px;overflow: hidden;">
                <tbody id="tbody-order-panel">
                </tbody>
                <tbody id="tbody-submit-panel">
                    <tr> 
                        <td colspan="6" style="text-align: right;padding: 3px; border-radius: 4px; gap: 10px">
                            <button type="button" onclick="validate(this)">Validate</button>
                            <button type="button" id="ow_submit_btn" onclick="submitOrder(this)" disabled >Order</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>  

<!--templates---------------------------------------------------------------------------------------------------------------------------->    

    <template id="order-list-row">
        <tr style="position: relative;">
            <td class="orderlist-td" width="16%">OrderId</td>
            <td class="orderlist-td" width="8%">Action</td>
            <td class="orderlist-td" width="15%">Quatity</td>
            <td class="orderlist-td" width="8%">Type</td>
            <td class="orderlist-td" width="16%">0</td>
            <td class="orderlist-td" width="16%">Price</td>
            <td class="orderlist-td" width="18%">Status</td>
            <td class="orderlist-td" width="3%">
                <label id="conf_cancel_lb">X</label>
                <div class="orderlist-row-overlay">
                    <button id='cancel_order_btn' class="clickable">Delete</button>
                    <button id='drop_cancel_btn' class="clickable">Cancel</button>
                </div>
            </td>
        </tr>
    </template>
    <template id="option-chain-row">
        <tr>
            <td></td> 
            <td></td> 
            <td class="hover-cell">
                <label class="icon"></label>
                <label></label>
                <trade-buttons></trade-buttons>
            </td> 
        </tr>
    </template>
    <template id="order-window-row">
        <tr id="order-window-tr" class="hover-row">
            <td style='width:6%;justify-items: center;'>
                <button  id='ow_action_btn' class="smallbutton buy"></button>
                <div class="hover-row-content">
                    <button id="ow_row_rm_btn" class="smallbutton order">X</button>
                </div>
            </td>
            <td style='width:32%'>
                <label id='owsymbol' hidden></label>
                <label id='scripName'></label>
            </td>
            <td style='width:14%'>
                    <label id="owprice"></label>
            </td>
            <td style='width:14%'>
                <select id="ow_lot_size">
                    <option value="1" selected>1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                </select>
            </td>
            <td style='width:17%'>
                <label class="clickable" id="ordertype">MARKET</label>
            </td>
            <td style='width:17%'>
                <input type="text" inputmode="numeric" id="lmtprice" style="width: 50px;border-radius: 3px;border: 0px" disabled>
            </td>
        </tr>
    </template>
    <template id="position-table-row">
        <tr>
            <td>
                <input type='checkbox' id="pos_exit_cb"  disabled></input>
            </td>
            <td><label id="Instrument"></label></td>
            <td>
                <button id="orderdisplay-btn" class="smallbutton order">N</button>
            </td>
            <td><label id="BQ"></label></td>
            <td><label id="BP"></label></td>
            <td><label id="AvgP"></label></td>
            <td><label id="LTP"></label></td>
            <td><label id="UQ"></label></td>
            <td><label id="UP"></label></td>
            <td class="hover-cell">
                <label></label>
                <trade-buttons></trade-buttons>
            </td>
        </tr>
    </template>
<!------------------------------------------------------------------------------------------------------------------------------>    
    
    <script src="../data.js"></script>
    <script src="../load.js"></script>
    <script src="../ui.js"></script>
    <script src="../helper.js"></script>
    <script src="../main.js"></script>
    <script src="../greeks.js"></script>
    <script src="../optionchain.js"></script>
    <script src="../positions.js"></script>
    <script src="../socketconn.js"></script>
    <script src="../order.js"></script>
    <script src="../chart.js"></script>
  </body>
</html>
