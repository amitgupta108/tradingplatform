<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" name="viewport" content="width=device-width,initial-scale=1.0"/>
    <meta http-equiv="Cache-Control" content="no-cache"/>
    <title>Trade Positions</title>
        <link rel="stylesheet" href="./styles.css">        
        <script type="text/javascript" src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
        <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>

    </head>
    <body>
    <div id="container">
        <div id="leftContainer">
            <div id="timer"></div>
            <!------------------------------------------------------------------------------------------------------------------------------>    
            
            <div id="Exp1" class="tab-content active">
                <div id="optionChain">  
                <table id="ocTable">
                    <thead id="ocHead">
                        <!-- <template id="ocheading"> -->
                    </thead>
                    <tbody id="ocBody">
                        <!-- <template id="option-chain-row"> -->
                    </tbody>
                </table> 
                </div>
            </div>
            <!------------------------------------------------------------------------------------------------------------------------------>    
            
            <div id="Exp2" class="tab-content">
                <div id="optionChain2">  
                    <table id="ocTable2">
                        <thead id="ocHead2">
                            <!-- <template id="ocheading"> -->
                        </thead>
                        <tbody id="ocBody2">
                            <!-- <template id="option-chain-row"> -->
                        </tbody>
                    </table> 
                </div>
            </div>

            <!------------------------------------------------------------------------------------------------------------------------------>    
            <div class="tabs">
                <div id="tabButton1" class="tab active-tab" onclick="switchExpiry(event, 'Exp1')">
                    <label>Expiry1</label>
                    <input type="number" id="tpt" name="tpt" style="width: 60px;padding:1px;">
                    <div id="wsc" class="smallbutton buy" onclick="wsconnect('connect')">></div>
                    <div id="wsd" class="smallbutton buy" onclick="wsconnect('disconnect')">||</div>
                    <div id="socn" class="smallbutton buy">@</div>
                    <label class="switch">
                        <input type="checkbox" id="toggleAction">
                        <span class="slider round"></span>
                      </label>
                </div>
                <div id="tabButton2" class="tab" onclick="switchExpiry(event, 'Exp2')">
                    <label>Expiry2</label>
                    <div id="ocNxt" class="smallbutton buy" onclick="runOptionChainNxt(event)">></div>
                </div>
            </div>
            
            <!------------------------------------------------------------------------------------------------------------------------------>                
            <div id="positions">    
            <table id="dataTable">
                <thead>
                    <tr>
                        <th width="9%">Expiry</th>
                        <th width="9%">Strike</th>
                        <th width="9%">CE/PE</th>
                        <th colspan="2" width="21%">Booked</th>                        
                        <th width="10%">Avg Price</th>
                        <th width="10%">LTP</th>
                        <th colspan="2" width="16%">Unbooked</th>
                        <th width="16%">Total</th>
                    </tr>
                </thead>    
                <tbody id="tblBody">
                    <tr hidden>
                        <td><label id="expiry"></label></td>
                        <td><label id="strike"></label></td>
                        <td><label id="right"></label></td>
                        <td><label id="BQ"></label></td>
                        <td style="display: flex; justify-content: space-evenly;">
                            <label id="BP"></label>
                            <button class="smallbutton order" onclick="displayOrders(event)">O</button>
                        </td>
                        <td><label id="AvgP"></label></td>
                        <td><label id="LTP"></label></td>
                        <td><label id="UQ"></label></td>
                        <td><label id="UP"></label></td>
                        <td class="hover-cell">
                            <label id="totalPL"></label>
                            <div  class="hover-content" >
                                <button  class="smallbutton buy" onclick="orderPos(event, 'BUY')">B</button>
                                <button  class="smallbutton sell" onclick="orderPos(event, 'SELL')">S</button>
                                <button  class="smallbutton order" onclick="orderPos(event, 'EXIT')">E</button>
                            </div>
                            <label hidden></label>
                        </td>
                    </tr>
                </tbody>
            </table>   
            </div>
            <!------------------------------------------------------------------------------------------------------------------------------>    
            
            <div id="bottomPanel">    
                <div>
                    <button type="button" id="btnLoad" onclick="loadPreData()">Load</button>
                    <button type="button" id="btnStartSim" onclick="start()">Start</button>
                    <button type="button" id="btnStopSim" onclick="stopSimulation()">Stop</button>
                    <button type="button" id="btnResumeSim" onclick="resumeSimulation()">Resume</button>
                    <button type="button" id="btnListOrders" onclick="listOrders()">{ O }</button>
                    <button type="button" id="btnExit" onclick="exit()">Exit</button>
                    <select id="optionSpeed" onchange="changeSpeed()">
                        <option value="1x">1x</option>
                        <option value="2x">2x</option>
                        <option value="3x">3x</option>
                        <option value="5x">5x</option>
                    </select>
                </div>

                <div id="bottomPLPanel">
                    <label  id="bookedPL">Booked: </label>
                    <label  id="vBookedPL">0.00</label>
                    <label  id="unbookedPL">Unbooked: </label>
                    <label  id="vUnbookedPL">0.00</label>
                    <label  id="totalPL">Total: </label>
                    <label  id="vTotalPL">0.00</label>
                </div>
            </div>
        </div>
        <!------------------------------------------------------------------------------------------------------------------------------>    

        <div id="rightContainer">
            <div id="chartLinks" class="tabs">
                <div id="tabLink1" class="tab2  active-tab" onclick="switchChart(event, 'chart', 'chart2')">Futures</div>
                <div id="tabLink2" class="tab2" onclick="switchChart(event, 'chart2', 'chart')">Options</div>
            </div>
            <div id="chart" class="chart-show">
            </div>
            <div id="chart2" class="chart-hide">
            </div>
        </div>
    </div>  
    <!------------------------------------------------------------------------------------------------------------------------------>    

    <div id="floating-container">
        <div id="orderwindow">
            <label id='owheading'></label>
            <label id='owaction' hidden></label>
            <label id='owsymbol' hidden></label>
            <label class="switch">
                <input type="checkbox" id="toggleAction">
                <span class="slider round"></span>
              </label>
            <span id="closeBtn" class="close-btn">x</span>
            <table>
            <tbody>
                <tr>
                    <td width="18%">
                            <label>Price</label>
                            <label id="owprice"></label>
                    </td>
                    <td width="20%">
                            <label for="lotselect">Lot size</label>
                            <select id="lotselect">
                                <option value="1">1</option>
                                <option value="2">2</option>
                                <option value="3">3</option>
                            </select>
                    </td>
                    <td width="14%">
                            <label for="mkt">Market</label>
                            <input type="radio" id="mkt" name="type" value="MARKET">                                
                    </td>
                    <td width="14%">
                            <label for="lmt">Limit</label>
                            <input type="radio" id="lmt" name="type" value="LIMIT" checked>
                    </td>
                    <td width="20%">
                            <label for="lmtprice">Limit Price</label>
                            <input type="number" id="lmtprice" name="lmtprice" step="0.5"  style="width:40px;padding:3px;">
                    </td>
                    <td width="14%">
                            <button type="button" id="submit" onclick="submitOrder()">Order</button>
                    </td>
                </tr>
            </tbody>
            </table>
        </div>
    </div>

    <div id="order-list" class="orderlist hidden">
        <table>
        <tbody id="order-list-body">
        </tbody>
        </table>
    </div>
<!------------------------------------------------------------------------------------------------------------------------------>    
<template id="oc-head-row">
    <tr>
        <th width="11%">IV</th>
        <th width="11%">Delta</th>
        <th width="12%">LTP</th>
        <th width="16%">CE</th>
        <th width="16%">PE</th>
        <th width="12%">LTP</th>
        <th width="11%">Delta</th>
        <th width="11%">IV</th>
    </tr>
  </template>    
  <template id="order-list-tr">
    <tr>
        <td class="orderlist-td" width="30%">Price</td>
        <td class="orderlist-td" width="30%">Quatity</td>
        <td class="orderlist-td" width="40%">Status</td>
    </tr>
</template>
<template id="option-chain-row">
    <tr>
        <td><label id="CEIV"></label></td> 
        <td><label id="CEDelta"></label></td> 
        <td><label id="CELTP"></label></td> 
        
        <td class="hover-cell">
            <label class="icon"></label>
            <label id="CEStrike"></label>
            <trade-buttons expiry="Expiry1" right="Call"></trade-buttons>
            <label hidden></label>
        </td> 
        <td class="hover-cell">
            <label class="icon"></label>
            <label id="PEStrike"></label>
            <trade-buttons expiry="Expiry1" right="Put"></trade-buttons>
            <label hidden></label>
        </td>
        <td><label id="PELTP"></label</td>
        <td><label id="PEDELTA"></label></td>
        <td><label id="PEIV"></label></td>
    </tr>
</template>
<!------------------------------------------------------------------------------------------------------------------------------>    

    <script src="../data.js"></script>
    <script src="../load.js"></script>
    <script src="../helper.js"></script>
    <script src="../main.js"></script>
    <script src="../optionchain.js"></script>
    <script src="../order.js"></script>
    <script src="../positions.js"></script>
    <script src="../chart.js"></script>
    <script src="../socketconn.js"></script>
  </body>
</html>
