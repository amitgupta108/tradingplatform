<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" name="viewport" content="width=device-width,initial-scale=1.0"/>
    <meta http-equiv="Cache-Control" content="no-cache"/>
    <title>Trade Positions</title>
        <link rel="stylesheet" href="./styles.css">        
        <script type="text/javascript" src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
        <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>

    </head>
    <body>
    <div id="container" class="top">
        <div id="leftContainer" class="container" style="width: 53%;">
            <div id="timer"></div>
            <!------------------------------------------------------------------------------------------------------------------------------>    
            
            <div id="Exp1" class="tab-content active" style="height: 39%;">
                <div id="optionChain">  
                <table id="ocTable">
                    <thead id="ocHead">
                        <!-- <template id="ocheading"> -->
                    </thead>
                    <tbody id="ocBody">
                        <!-- <template id="option-chain-row"> -->
                    </tbody>
                </table> 
                </div>
            </div>
            <!------------------------------------------------------------------------------------------------------------------------------>    
            
            <div id="Exp2" class="tab-content" style="height: 39%;">
                <div id="optionChain2">  
                    <table id="ocTable2">
                        <thead id="ocHead2">
                            <!-- <template id="ocheading"> -->
                        </thead>
                        <tbody id="ocBody2">
                            <!-- <template id="option-chain-row"> -->
                        </tbody>
                    </table> 
                </div>
            </div>

            <!------------------------------------------------------------------------------------------------------------------------------>    
            <div class="tabs">
                <div id="tabButton1" class="tab active-tab" onclick="switchTabs(event, 'leftContainer', 'Exp1')">
                    <label>Expiry1</label>
                </div>
                <div id="tabButton2" class="tab inert-tab">
                    <input type="number" id="tpt" name="tpt" style="width: 60px;padding:1px;">
                    <div id="wsc" class="smallbutton buy" onclick="wsconnect('connect')">></div>
                    <div id="wsd" class="smallbutton buy" onclick="wsconnect('disconnect')">||</div>
                    <div id="socn" class="smallbutton buy">@</div>
                    <label class="switch">
                        <input type="checkbox" id="toggleBasket">
                        <span class="slider round"></span>
                      </label>
                </div>
                <div id="tabButton3" class="tab" onclick="switchTabs(event, 'leftContainer', 'Exp2')">
                    <label>Expiry2</label>
                    <div id="ocNxt" class="smallbutton buy" onclick="runOptionChainNxt(event)">></div>
                </div>
            </div>
            
            <!------------------------------------------------------------------------------------------------------------------------------>                
            <div id="positions">    
            <table id="dataTable">
                <thead>
                    <tr>
                        <th width="22%">Instrument</th>
                        <th colspan="2" width="22%">Booked</th>                        
                        <th width="14%">Avg Price</th>
                        <th width="14%">LTP</th>
                        <th colspan="2" width="20%">Unbooked</th>
                        <th width="18%">Total</th>
                    </tr>
                </thead>    
                <tbody id="tblBody">
                    <tr hidden>
                        <td><label id="Instrument"></label></td>
                        <td><label id="BQ"></label></td>
                        <td style="display: flex; justify-content: space-evenly;">
                            <label id="BP"></label>
                            <button class="smallbutton order" onclick="displayOrders(event)">O</button>
                        </td>
                        <td><label id="AvgP"></label></td>
                        <td><label id="LTP"></label></td>
                        <td><label id="UQ"></label></td>
                        <td><label id="UP"></label></td>
                        <td class="hover-cell">
                            <label id="totalPL"></label>
                            <trade-buttons></trade-buttons>
                            <label hidden></label>
                        </td>
                    </tr>
                </tbody>
            </table>   
            </div>
            <!------------------------------------------------------------------------------------------------------------------------------>    
            
            <div id="bottomPanel">    
                <div>
                    <button type="button" id="btnLoad" onclick="loadPreData()">Load</button>
                    <button type="button" id="btnStartSim" onclick="start()">Start</button>
                    <button type="button" id="btnStopSim" onclick="stopSimulation()">Stop</button>
                    <button type="button" id="btnResumeSim" onclick="resumeSimulation()">Resume</button>
                    <button type="button" id="btnListOrders" onclick="listOrders()">{ O }</button>
                    <button type="button" id="btnExit" onclick="exit()">Exit</button>
                    <select id="optionSpeed" onchange="changeSpeed()">
                        <option value="1x">1x</option>
                        <option value="2x">2x</option>
                        <option value="3x">3x</option>
                        <option value="5x">5x</option>
                    </select>
                </div>

                <div id="bottomPLPanel">
                    <label  id="bookedPL">Booked: </label>
                    <label  id="vBookedPL">0.00</label>
                    <label  id="unbookedPL">Unbooked: </label>
                    <label  id="vUnbookedPL">0.00</label>
                    <label  id="totalPL">Total: </label>
                    <label  id="vTotalPL">0.00</label>
                </div>
            </div>
        </div>
        <!------------------------------------------------------------------------------------------------------------------------------>    
        <div id="rightContainer" class="container" style="width: 46%";>
            <div id="chartLinks" class="tabs">
                <div id="tabLink1" class="tab  active-tab" onclick="switchTabs(event, 'rightContainer', 'chart1')">Futures</div>
                <div id="tabLink2" class="tab" onclick="switchTabs(event, 'rightContainer', 'chart2')">Options</div>
            </div>
            <div id="chart1" class="tab-content active" style="height: 95%;">
            </div>
            <div id="chart2" class="tab-content" style="height: 95%;">
            </div>
        </div>
    </div>  
    <!------------------------------------------------------------------------------------------------------------------------------>    

    <div id="orderwindow" class="orderwindow">
        <span id="closeBtn" class="close-btn">x</span>
        <table >
            <tbody id="tbody-order-panel-single">
                <tr> 
                    <td colspan="6" style="text-align: right;padding-right: 15px;">
                        <button type="button" onclick="submitOrder()">Order</button>
                    </td>
                </tr>
            </tbody>

            <tbody id="tbody-order-panel-basket">
                <tr> 
                    <td colspan="6" style="text-align: right;padding-right: 15px;">
                        <button type="button" onclick="submitOrder()">Order</button>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
    <div id="order-list" class="orderlist hidden">
        <table>
        <tbody id="order-list-body">
        </tbody>
        </table>
    </div>
<!------------------------------------------------------------------------------------------------------------------------------>    
<template id="oc-head-row">
    <tr>
        <th width="11%">IV</th>
        <th width="11%">Delta</th>
        <th width="12%">LTP</th>
        <th width="16%">CE</th>
        <th width="16%">PE</th>
        <th width="12%">LTP</th>
        <th width="11%">Delta</th>
        <th width="11%">IV</th>
    </tr>
</template>    
<template id="order-list-tr">
    <tr>
        <td class="orderlist-td" width="30%">Price</td>
        <td class="orderlist-td" width="30%">Quatity</td>
        <td class="orderlist-td" width="40%">Status</td>
    </tr>
</template>
<template id="option-chain-row">
    <tr>
        <td><label id="CEIV"></label></td> 
        <td><label id="CEDelta"></label></td> 
        <td><label id="CELTP"></label></td> 
        
        <td class="hover-cell">
            <label class="icon"></label>
            <label id="CEStrike"></label>
            <trade-buttons></trade-buttons>
            <label hidden></label>
        </td> 
        <td class="hover-cell">
            <label class="icon"></label>
            <label id="PEStrike"></label>
            <trade-buttons></trade-buttons>
            <label hidden></label>
        </td>
        <td><label id="PELTP"></label</td>
        <td><label id="PEDELTA"></label></td>
        <td><label id="PEIV"></label></td>
    </tr>
</template>
<template id="order-window-row">
    <tr>
        <td style='width:6%'>
            <button  id='owaction' class="smallbutton buy" onclick="orderwindow(this, 'F')"></button>
        </td>
        <td style='width:28%'>
            <label id='owsymbol' hidden></label>
            <label id='scripName'></label>
        </td>
        <td style='width:15%'>
                <label id="owprice"></label>
        </td>
        <td style='width:15%'>
                <select id="lotselect">
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                </select>
        </td>
        <td style='width:20%'>
            <label class="clickable" id="ordertype" onclick="changeText()">MARKET</label>
        </td>
        <td style='width:16%'>
            <input type="number" id="lmtprice" step="0.5" style="width: 60px;">
        </td>
    </tr>
</template>
<!------------------------------------------------------------------------------------------------------------------------------>    

    <script src="../data.js"></script>
    <script src="../load.js"></script>
    <script src="../helper.js"></script>
    <script src="../main.js"></script>
    <script src="../optionchain.js"></script>
    <script src="../order.js"></script>
    <script src="../positions.js"></script>
    <script src="../chart.js"></script>
    <script src="../socketconn.js"></script>
  </body>
</html>
